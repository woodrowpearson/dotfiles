# Dev Box observability — curated for single-box dev machine
# See spec: ~/.claude/specs/2026-04-26-dev-box-observability-cleanup-design.md

[global]
refresh=3
history_size=1200
strftime_format=%H:%M:%S

[outputs]
# Use color-friendly defaults; sidebar quadrant placement is user's responsibility (Rectangle/Raycast).
max_processes_display=20

# ---- Hidden modules (sidebar overhead reduction) ----
[docker]
disable=True

[containers]
disable=True

[raid]
disable=True

[wifi]
disable=True

[connections]
disable=True

[ports]
disable=True

[gpu]
disable=True

[npu]
disable=True

[irq]
disable=True

[amps]
disable=True

[quicklook]
disable=True

[smart]
disable=True

[now]
disable=True

# ---- Visible modules with curated thresholds ----

[cpu]
careful=50
warning=70
critical=90

[load]
careful=0.7
warning=1.0
critical=1.5
warning_action_repeat=@HOME@/.local/bin/devbox-snapshot.sh load '{{value}}'
critical_action_repeat=@HOME@/.local/bin/devbox-snapshot.sh load '{{value}}'

[mem]
careful=70
warning=85
critical=92
warning_action_repeat=@HOME@/.local/bin/devbox-snapshot.sh mem '{{percent}}'
critical_action_repeat=@HOME@/.local/bin/devbox-snapshot.sh mem '{{percent}}'

[memswap]
careful=40
warning=60
critical=80
warning_action_repeat=@HOME@/.local/bin/devbox-snapshot.sh swap '{{percent}}'
critical_action_repeat=@HOME@/.local/bin/devbox-snapshot.sh swap '{{percent}}'

[fs]
careful=70
warning=80
critical=90
critical_action_repeat=@HOME@/.local/bin/devbox-snapshot.sh fs '{{percent}}' '{{mnt_point}}'
hide=/Volumes/.*,/private/var/.*,/System/Volumes/Preboot,/System/Volumes/Recovery,/System/Volumes/VM,/System/Volumes/xarts,/System/Volumes/iSCPreboot,/System/Volumes/Hardware,/System/Volumes/Update,/Library/Developer/CoreSimulator/.*

[diskio]
hide=disk[0-9]+s[0-9]+

[network]
hide=lo0,llw0,utun.*,awdl0,gif0,stf0

[sensors]
disable=True

[processlist]
sort_key=memory_percent

[help]
disable=False

[alert]
history=15
